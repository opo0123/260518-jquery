<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jq site</title>
    <link rel="stylesheet" href="css/jq_site.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/jq_site.js"></script>
  </head>
  <body>
    <header class="header">
      <h1 class="logo">SHOP</h1>
      <ul class="menu">
        <li>NEW</li>
        <li>BEST</li>
        <li>SALE</li>
        <li>EVENT</li>
      </ul>
      <div class="mobile-btn">☰</div>
    </header>
    <!-- 모바일 메뉴 -->
    <div class="mobile-menu">
      <ul>
        <li>NEW</li>
        <li>BEST</li>
        <li>SALE</li>
        <li>EVENT</li>
      </ul>
    </div>
    <section class="visual">
      <h1>SUMMER COLLECTION</h1>
      <p>GREEN 쇼핑몰</p>
    </section>
    <section class="search-wrap">
      <input type="text" class="search-input" placeholder="상품 검색" />
      <div class="tab-menu">
        <div class="tab-btn active" data-category="all">전체</div>
        <div class="tab-btn" data-category="shoes">신발</div>
        <div class="tab-btn" data-category="bag">가방</div>
        <div class="tab-btn" data-category="cap">모자</div>
      </div>
    </section>
    <section class="product-wrap">
      <!-- js 출력 -->

    </section>
  </body>
</html>
